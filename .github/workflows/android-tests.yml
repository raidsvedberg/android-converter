name: Android UI Test Suites

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

env:
  ALLURE_VERSION: 2.41.0

jobs:

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils
          sudo chmod 666 /dev/kvm

      - name: Run Smoke Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel
          emulator-options: >
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -camera-back none
            -no-snapshot
            -no-metrics
          emulator-boot-timeout: 900
          script: |
            adb wait-for-device
            sleep 60            
            ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.example.convapp.tests.SmokeTests

      - name: Upload Smoke Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: |
            app/build/reports/androidTests/connected/
          if-no-files-found: error

      - name: Upload Smoke Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failure-screenshots
          path: |
            **/test-screenshots/**
            **/*.png

  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils
          sudo chmod 666 /dev/kvm

      - name: Clear previous Allure results
        run: rm -rf app/build/allure-results

      - name: Run Functional Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel
          emulator-options: >
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -camera-back none
            -no-snapshot
            -no-metrics
          emulator-boot-timeout: 900
          script: |
            adb wait-for-device
            sleep 60            
            ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.example.convapp.tests.FunctionalTests

      - name: Upload Functional Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functional-report
          path: |
            app/build/reports/androidTests/connected/
          if-no-files-found: error

      - name: Upload Functional Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: functional-failure-screenshots
          path: |
            **/test-screenshots/**
            **/*.png

  edge-tests:
    name: Edge Case Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils
          sudo chmod 666 /dev/kvm

      - name: Clear previous Allure results
        run: rm -rf app/build/allure-results

      - name: Run Edge Case Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel
          emulator-options: >
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -camera-back none
            -no-snapshot
            -no-metrics
          emulator-boot-timeout: 900
          script: |
            adb wait-for-device
            sleep 60
            ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.example.convapp.tests.EdgeCaseTests

      - name: Upload Edge Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edge-report
          path: |
            app/build/reports/androidTests/connected/
          if-no-files-found: error

      - name: Upload Edge Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: edge-failure-screenshots
          path: |
            **/test-screenshots/**
            **/*.png

  publish-report:
    name: Publish Test Report
    runs-on: ubuntu-latest

    needs:
      - smoke-tests
      - functional-tests
      - edge-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Smoke Report
        uses: actions/download-artifact@v4
        with:
          name: smoke-report
          path: reports/smoke

      - name: Download Functional Report
        uses: actions/download-artifact@v4
        with:
          name: functional-report
          path: reports/functional

      - name: Download Edge Report
        uses: actions/download-artifact@v4
        with:
          name: edge-report
          path: reports/edge

      - name: Prepare GitHub Pages
        run: |
          mkdir public
          cp -r reports/* public/

      - name: Deploy Reports
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public